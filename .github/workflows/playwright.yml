name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        # SIT tests (tests/sit-mvp3/, tests/sit-mvp2/) require a live Salesforce SIT session
        # and cannot run on CI without credentials. We skip those and only run non-SIT tests.
        # If there are no non-SIT tests, this step exits 0 gracefully.
        run: |
          TESTS=$(find tests -name "*.spec.js" ! -path "*/sit-*/*" 2>/dev/null | head -1)
          if [ -n "$TESTS" ]; then
            npx playwright test --ignore=tests/sit-mvp2 --ignore=tests/sit-mvp3
          else
            echo "No non-SIT tests found. Skipping test run (SIT tests require a live Salesforce session)."
            exit 0
          fi
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
